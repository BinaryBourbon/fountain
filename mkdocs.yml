site_name: Fountain
site_description: Multi-tenant API and UI for managing agents, environments, and secrets.
site_url: https://binarybourbon.github.io/fountain
repo_url: https://github.com/BinaryBourbon/fountain
repo_name: BinaryBourbon/fountain
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Setup: setup.md
  - The four primitives: primitives.md
  - CLI reference: cli.md
  - API reference: api.md
  - LLM integration: llm-integration.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/BinaryBourbon/fountain
