projects:
  - name: fountain
    environments:
      - name: prod
        services:
          - type: web
            name: fountain
            runtime: elixir
            plan: starter
            region: oregon
            buildCommand: |
              mix local.hex --force
              mix local.rebar --force
              mix deps.get --only prod
              MIX_ENV=prod mix compile
              MIX_ENV=prod mix release fountain_server
            startCommand: _build/prod/rel/fountain_server/bin/server
            preDeployCommand: _build/prod/rel/fountain_server/bin/migrate
            healthCheckPath: /health

            envVars:
              # Shared secrets + config from the dashboard-managed env group.
              # Service-local envVars below override any same-named keys in the group.
              - fromGroup: fountain-prod-core

              - key: PHX_SERVER
                value: "true"
              - key: FOUNTAIN_DOMAIN
                value: fountain.inevitable.fyi
              - key: PORT
                value: "10000"

              # Auto-generated secrets
              - key: SECRET_KEY_BASE
                generateValue: true

              # Set via dashboard (sync: false hides from yaml)
              - key: MASTER_SECRETS_KEY
                sync: false
              - key: SPRITES_TOKEN
                sync: false
              # Inference credentials (ANTHROPIC_API_KEY, OPENAI_API_KEY,
              # GEMINI_API_KEY, CLAUDE_CODE_OAUTH_TOKEN) are per-user (BYO,
              # ADR 0008) — stored encrypted in the inference_credentials
              # table, not as platform-level env vars.
              - key: GITHUB_OAUTH_CLIENT_ID
                sync: false
              - key: GITHUB_OAUTH_CLIENT_SECRET
                sync: false
              - key: STRIPE_SECRET_KEY
                sync: false
              - key: STRIPE_PUBLISHABLE_KEY
                sync: false
              - key: STRIPE_WEBHOOK_SECRET
                sync: false
              - key: STRIPE_PRICE_ID
                sync: false

              # Resend transactional email
              - key: RESEND_API_KEY
                sync: false
              - key: EMAIL_FROM
                value: noreply@updates.inevitable.fyi

              - key: ELIXIR_VERSION
                value: "1.19.2"
              - key: ERLANG_VERSION
                value: "28.3"

              - key: DATABASE_URL
                fromDatabase:
                  name: fountain-db
                  property: connectionString

        databases:
          - name: fountain-db
            plan: basic-256mb
            region: oregon
            databaseName: fountain
            user: fountain
