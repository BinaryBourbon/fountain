name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            runner: ubuntu-latest
            artifact: fountain-linux-x86_64
          - target: macos
            runner: macos-latest
            artifact: fountain-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.13.0"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Build Burrito release
        env:
          MIX_ENV: prod
          BURRITO_TARGETS: ${{ matrix.target }}
        run: mix release fountain

      - name: Stage artifact
        run: |
          # Burrito outputs to burrito_out/<release>_<target>
          mv burrito_out/fountain_${{ matrix.target }} ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/fountain-linux-x86_64/fountain-linux-x86_64
            artifacts/fountain-macos-aarch64/fountain-macos-aarch64
          generate_release_notes: true
