name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release as (e.g. v0.1.0). Must already exist on a commit."
        required: true

env:
  ELIXIR_VERSION: "1.19.5"
  # OTP_VERSION is also encoded in the macOS custom_erts URL in mix.exs
  # (vendor-erts-otp-28.4). Bytecode built here runs against that ERTS,
  # so the major version MUST match.
  OTP_VERSION: "28.4"
  # Burrito 1.5.0 requires zig 0.15.2 (checked at build time in
  # `Burrito.check_zig_version/0`). Bumping below that range will
  # fail with "Your Zig version does not match the one Burrito requires".
  ZIG_VERSION: "0.15.2"

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            runner: ubuntu-latest
            artifact: fountain-linux-x86_64
          - target: macos
            runner: macos-latest
            artifact: fountain-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Build Burrito release
        env:
          MIX_ENV: prod
          BURRITO_TARGETS: ${{ matrix.target }}
        run: mix release fountain --overwrite

      - name: Stage artifact
        run: |
          # Burrito outputs to burrito_out/<release>_<target>
          mv burrito_out/fountain_${{ matrix.target }} ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: |
            artifacts/fountain-linux-x86_64/fountain-linux-x86_64
            artifacts/fountain-macos-aarch64/fountain-macos-aarch64
          generate_release_notes: true
